<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MLCC Blue Tees Game</title>
<style>
:root{--bg:#f4f7f4;--card:#fff;--ink:#102119;--muted:#66736b;--line:#d8e1da;--green:#0e5f3d;--green2:#e9f6ef;--blue:#eaf2ff;--gold:#fff4c7;--red:#feecec;--shadow:0 8px 24px rgba(10,45,25,.1)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:76px}header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#083d28,#10653f);color:#fff;padding:8px 12px;box-shadow:var(--shadow)}
.head{max-width:980px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:8px}.head h1{font-size:16px;margin:0}.head .sub{font-size:11px;color:#d7eee0;margin-top:2px}.sync{font-size:10px;color:#d7eee0;text-align:right}main{max-width:980px;margin:auto;padding:10px}.tab{display:none}.tab.active{display:block}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:6px 6px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px rgba(0,0,0,.08)}.tabBtn{border:0;background:transparent;border-radius:14px;padding:7px 3px;color:var(--muted);font-weight:800;font-size:11px}.tabBtn.active{background:var(--green2);color:var(--green)}
.card{background:var(--card);border-radius:16px;padding:12px;box-shadow:var(--shadow);margin-bottom:10px;overflow:auto}h2{font-size:16px;margin:0 0 8px}.muted{color:var(--muted);font-size:12px}.big{font-size:23px;font-weight:900}.row{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#f8fbf9;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:700}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.seg>div{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfdfb}.winner{background:var(--green2)!important}.tie{background:var(--gold)!important}.cut{background:var(--red)!important}.open{background:#f9fafb!important}.teamToggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.teamBtn,.btn{border:1px solid var(--line);background:white;border-radius:12px;padding:10px;font-weight:900}.teamBtn.active,.btn.primary{background:var(--green);border-color:var(--green);color:white}.holeNav{display:flex;gap:6px;overflow:auto;padding-bottom:6px}.holeBtn{min-width:38px;border:1px solid var(--line);background:white;border-radius:10px;padding:8px 0;font-weight:900}.holeBtn.active{background:var(--green);color:white}.entryPlayer{border-bottom:1px solid var(--line);padding:8px 0}.entryPlayer:last-child{border-bottom:0}.scoreBtns{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}.scoreBtn{border:1px solid #cbd6cf;background:white;border-radius:10px;padding:9px 0;font-size:15px;font-weight:900}.scoreBtn.active{background:var(--green);color:white}.scoreBtn.clear{color:#8a1f1f;background:#fff7f7;font-size:12px}.scoreGrid{display:grid;grid-template-columns:repeat(18,44px) 56px 56px 56px;gap:3px;align-items:stretch}.scoreRow{display:contents}.cell{min-height:30px;border:1px solid var(--line);border-radius:7px;background:white;padding:4px;text-align:center;font-size:11px;display:flex;align-items:center;justify-content:center;flex-direction:column}.label{position:sticky;left:0;z-index:2;justify-content:center;font-weight:900;background:#fff;min-width:74px}.counting{background:var(--green2);border-color:#79b894;font-weight:900}.grossNet{font-size:13px;font-weight:900}.small{font-size:10px;color:var(--muted)}table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}th,td{padding:7px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap}th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:1}.money{font-weight:900;color:var(--green)}@media(max-width:640px){main{padding:8px}.head h1{font-size:15px}.sync{display:none}.seg{grid-template-columns:1fr}.card{border-radius:14px;padding:10px}.scoreGrid{grid-template-columns:74px repeat(18,38px) 46px 46px 46px}.cell{font-size:10px;padding:3px}.grossNet{font-size:12px}.scoreBtns{grid-template-columns:repeat(5,1fr)}.tabBtn{font-size:10px}}
</style>
</head>
<body>
<header><div class="head"><div><h1>Marsh Landing Blue Tees</h1><div class="sub">Team net score · net skins · live scorecard</div></div><div id="syncStatus" class="sync">Local mode</div></div></header>
<main>
<section id="scoreTab" class="tab active"><div class="card"><div class="row"><div><div class="big" id="holeTitle"></div><div class="muted" id="holeMeta"></div></div><div><button class="btn" id="prevHole">Prev</button><button class="btn primary" id="nextHole">Next</button></div></div><div class="holeNav" id="holeNav"></div><div class="teamToggle"><button class="teamBtn active" data-team="Group 1">Group 1</button><button class="teamBtn" data-team="Group 2">Group 2</button></div><div id="entry"></div></div></section>
<section id="scorecardTab" class="tab"><div class="card"><h2>Scorecard</h2><div class="muted">Gross/net shown as 4/3. Green cells are counting scores for the team game.</div><div id="scorecard"></div></div></section>
<section id="leaderTab" class="tab"><div class="card"><h2>Team Leaderboard</h2><div id="leaderboard"></div></div><div class="card"><h2>Skins</h2><div id="skins"></div></div></section>
<section id="payoutTab" class="tab"><div class="card"><h2>Final Payout</h2><div id="payouts"></div></div></section>
</main>
<nav class="tabs"><button class="tabBtn active" data-tab="scoreTab">🏌️<br>Scores</button><button class="tabBtn" data-tab="scorecardTab">📋<br>Card</button><button class="tabBtn" data-tab="leaderTab">🏆<br>Board</button><button class="tabBtn" data-tab="payoutTab">💰<br>Payout</button></nav>
<script type="module">
const firebaseConfig={}; // Paste Firebase web config here.
const TEAM_BUY_IN=15, SKINS_BUY_IN=10;
const course=[{hole:1,par:4,hcp:13},{hole:2,par:3,hcp:15},{hole:3,par:4,hcp:1},{hole:4,par:4,hcp:5},{hole:5,par:5,hcp:17},{hole:6,par:4,hcp:7},{hole:7,par:4,hcp:3},{hole:8,par:3,hcp:9},{hole:9,par:5,hcp:11},{hole:10,par:4,hcp:14},{hole:11,par:4,hcp:8},{hole:12,par:3,hcp:12},{hole:13,par:4,hcp:4},{hole:14,par:4,hcp:6},{hole:15,par:5,hcp:16},{hole:16,par:3,hcp:18},{hole:17,par:5,hcp:10},{hole:18,par:4,hcp:2}];
const players=[{id:'mike',name:'Mike',hdcp:9.5,team:'Group 1'},{id:'tommy',name:'Tommy',hdcp:17.4,team:'Group 1'},{id:'steven',name:'Steven',hdcp:11.7,team:'Group 1'},{id:'parks',name:'Parks',hdcp:16.5,team:'Group 1'},{id:'lowe',name:'Lowe',hdcp:11.7,team:'Group 2'},{id:'corey',name:'Corey',hdcp:17.6,team:'Group 2'},{id:'nick',name:'Nick',hdcp:12.1,team:'Group 2'},{id:'miller',name:'Miller',hdcp:16.1,team:'Group 2'}];
let scores=JSON.parse(localStorage.getItem('mlccScores')||'{}'), currentHole=+(localStorage.getItem('mlccHole')||1), activeTeam=localStorage.getItem('mlccTeam')||'Group 1';
let docRef=null,setDoc=null,suppress=false; const $=id=>document.getElementById(id); const ch=p=>Math.round(p.hdcp); const count=par=>par===3?3:par===5?2:1; const gross=(p,h)=>+(scores[p.id]?.[h.hole]||0); const strokes=(p,h)=>Math.floor(ch(p)/18)+(h.hcp<=ch(p)%18?1:0); const net=(p,h)=>gross(p,h)?gross(p,h)-strokes(p,h):null; const parSum=(a,b)=>course.filter(h=>h.hole>=a&&h.hole<=b).reduce((t,h)=>t+h.par*count(h.par),0);
function save(){localStorage.setItem('mlccScores',JSON.stringify(scores));localStorage.setItem('mlccHole',currentHole);localStorage.setItem('mlccTeam',activeTeam); if(docRef&&!suppress)setDoc(docRef,{scores,currentHole,activeTeam,updatedAt:Date.now()},{merge:true})}
function setScore(pid,hole,val){scores[pid]??={}; if(val==='')delete scores[pid][hole]; else scores[pid][hole]=+val; save(); render()}
function countingIds(team,h){return players.filter(p=>p.team===team).map(p=>({id:p.id,n:net(p,h)})).filter(x=>x.n!==null).sort((a,b)=>a.n-b.n).slice(0,count(h.par)).map(x=>x.id)}
function teamHole(team,h){const vals=players.filter(p=>p.team===team).map(p=>net(p,h)).filter(v=>v!==null).sort((a,b)=>a-b); return vals.length>=count(h.par)?vals.slice(0,count(h.par)).reduce((a,b)=>a+b,0):null}
function segment(team,a,b){let total=0,open=false;course.filter(h=>h.hole>=a&&h.hole<=b).forEach(h=>{const s=teamHole(team,h); if(s===null)open=true; else total+=s});return {score:total,open,vsPar:total-parSum(a,b)}}
function segmentWinner(a,b){const g1=segment('Group 1',a,b),g2=segment('Group 2',a,b); if(g1.open||g2.open)return 'Open'; if(g1.score<g2.score)return 'Group 1'; if(g2.score<g1.score)return 'Group 2'; return 'Tie'}
function fmt(v){return v===0?'E':v>0?`+${v}`:`${v}`}
function renderEntry(){const h=course[currentHole-1];$('holeTitle').textContent=`Hole ${h.hole}`;$('holeMeta').textContent=`Par ${h.par} · HCP ${h.hcp} · count ${count(h.par)} net ball${count(h.par)>1?'s':''}`;$('holeNav').innerHTML=course.map(x=>`<button class="holeBtn ${x.hole===currentHole?'active':''}" data-hole="${x.hole}">${x.hole}</button>`).join('');document.querySelectorAll('.holeBtn').forEach(b=>b.onclick=()=>{currentHole=+b.dataset.hole;save();render()});document.querySelectorAll('.teamBtn').forEach(b=>b.classList.toggle('active',b.dataset.team===activeTeam));
$('entry').innerHTML=players.filter(p=>p.team===activeTeam).map(p=>{const g=gross(p,h),n=net(p,h);return `<div class="entryPlayer"><div class="row"><div><b>${p.name}</b><div class="muted">${p.hdcp} index · ${strokes(p,h)} stroke${strokes(p,h)===1?'':'s'} here</div></div><div><b>${g||'-'} / ${n??'-'}</b></div></div><div class="scoreBtns">${[2,3,4,5,6,7,8,9,10].map(x=>`<button class="scoreBtn ${g===x?'active':''}" data-p="${p.id}" data-h="${h.hole}" data-s="${x}">${x}</button>`).join('')}<button class="scoreBtn clear" data-p="${p.id}" data-h="${h.hole}" data-s="">Clear</button></div></div>`}).join('');document.querySelectorAll('.scoreBtn').forEach(b=>b.onclick=()=>setScore(b.dataset.p,b.dataset.h,b.dataset.s))}
function renderLeaderboard(){const rows=[['Front',1,9],['Back',10,18],['Overall',1,18]];$('leaderboard').innerHTML='<div class="seg">'+rows.map(r=>{const g1=segment('Group 1',r[1],r[2]),g2=segment('Group 2',r[1],r[2]),w=segmentWinner(r[1],r[2]);return `<div class="${w==='Tie'?'tie':w==='Open'?'open':'winner'}"><div class="muted">${r[0]}</div><div class="big">${w}</div><div>Group 1: <b>${g1.open?'open':fmt(g1.vsPar)}</b></div><div>Group 2: <b>${g2.open?'open':fmt(g2.vsPar)}</b></div><div class="muted">Net team score vs net par</div></div>`}).join('')+'</div>'}
function renderScorecard(){let html='<div class="scoreGrid"><div class="cell label">Hole</div>'+course.map(h=>`<div class="cell"><b>${h.hole}</b><span class="small">P${h.par} H${h.hcp}</span></div>`).join('')+'<div class="cell"><b>OUT</b></div><div class="cell"><b>IN</b></div><div class="cell"><b>TOT</b></div>';
for(const p of players){html+=`<div class="cell label">${p.name}<span class="small">${p.team}</span></div>`; for(const h of course){const g=gross(p,h),n=net(p,h),isCount=countingIds(p.team,h).includes(p.id); html+=`<div class="cell ${isCount?'counting':''}">${g?`<span class="grossNet">${g}/${n}</span>`:'-'}</div>`} const front=course.slice(0,9),back=course.slice(9); const sum=(holes,fn)=>holes.reduce((t,h)=>t+(fn(p,h)||0),0); html+=`<div class="cell">${sum(front,gross)}/${sum(front,net)}</div><div class="cell">${sum(back,gross)}/${sum(back,net)}</div><div class="cell"><b>${sum(course,gross)}/${sum(course,net)}</b></div>`}
html+='</div>';$('scorecard').innerHTML=html}
function skinRows(){return course.map(h=>{const vals=players.map(p=>({p,g:gross(p,h),n:net(p,h)})).filter(x=>x.n!==null).sort((a,b)=>a.n-b.n); if(vals.length<8)return{hole:h.hole,status:'Open'}; if(vals[0].n===vals[1].n)return{hole:h.hole,status:'Cut',net:vals[0].n}; return{hole:h.hole,status:'Skin',name:vals[0].p.name,gross:vals[0].g,net:vals[0].n}})}
function skinsByPlayer(){const wins=skinRows().filter(r=>r.status==='Skin'),val=wins.length?players.length*SKINS_BUY_IN/wins.length:0,by={};players.forEach(p=>by[p.name]={count:0,money:0});wins.forEach(w=>{by[w.name].count++;by[w.name].money+=val});return{wins,val,by}}
function renderSkins(){const {wins,val,by}=skinsByPlayer();$('skins').innerHTML=`<div class="seg"><div><div class="muted">Pot</div><div class="big">$80</div></div><div><div class="muted">Skins</div><div class="big">${wins.length}</div></div><div><div class="muted">Value</div><div class="big">$${val.toFixed(2)}</div></div></div><table><thead><tr><th>Hole</th><th>Status</th><th>Winner</th><th>Score</th><th>$</th></tr></thead><tbody>${skinRows().map(r=>`<tr class="${r.status==='Skin'?'winner':r.status==='Cut'?'cut':''}"><td>${r.hole}</td><td>${r.status}</td><td>${r.name||''}</td><td>${r.gross?`${r.gross}/${r.net}`:r.net??''}</td><td>${r.status==='Skin'?'$'+val.toFixed(2):''}</td></tr>`).join('')}</tbody></table>`}
function gameMoney(){const by={};players.forEach(p=>by[p.name]=0);[[1,9],[10,18],[1,18]].forEach(([a,b])=>{const w=segmentWinner(a,b),pot=players.length*TEAM_BUY_IN/3;if(w==='Group 1'||w==='Group 2')players.filter(p=>p.team===w).forEach(p=>by[p.name]+=pot/4); else if(w==='Tie')players.forEach(p=>by[p.name]+=pot/8)});return by}
function renderPayouts(){const skins=skinsByPlayer().by,game=gameMoney();$('payouts').innerHTML=`<table><thead><tr><th>Player</th><th>Team</th><th>Game</th><th>Skins</th><th>Total</th><th>Net +/-</th></tr></thead><tbody>${players.map(p=>{const total=game[p.name]+skins[p.name].money,netOut=TEAM_BUY_IN+SKINS_BUY_IN;return `<tr><td>${p.name}</td><td>${p.team}</td><td>$${game[p.name].toFixed(2)}</td><td>${skins[p.name].count} / $${skins[p.name].money.toFixed(2)}</td><td class="money">$${total.toFixed(2)}</td><td>${total-netOut>=0?'+':''}$${(total-netOut).toFixed(2)}</td></tr>`}).join('')}</tbody></table><p class="muted">Game pot is $120 split equally across front/back/overall. Skins pot is $80 split by clean low-net skins.</p>`}
function render(){renderEntry();renderLeaderboard();renderScorecard();renderSkins();renderPayouts()}
document.querySelectorAll('.tabBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabBtn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active')});document.querySelectorAll('.teamBtn').forEach(b=>b.onclick=()=>{activeTeam=b.dataset.team;save();render()});$('prevHole').onclick=()=>{currentHole=Math.max(1,currentHole-1);save();render()};$('nextHole').onclick=()=>{currentHole=Math.min(18,currentHole+1);save();render()};
async function initFirebase(){if(!firebaseConfig.projectId){render();return}const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');const{getFirestore,doc,setDoc:sd,onSnapshot}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');setDoc=sd;const db=getFirestore(initializeApp(firebaseConfig));docRef=doc(db,'rounds','mlcc-blue-tees');$('syncStatus').textContent='Firebase live';onSnapshot(docRef,s=>{if(!s.exists()){save();return}suppress=true;const d=s.data();scores=d.scores||{};currentHole=d.currentHole||currentHole;activeTeam=d.activeTeam||activeTeam;render();suppress=false})}initFirebase();
</script>
</body>
</html>
